{% extends 'dashboard/base.html' %}
{% block title %}{{ action }} client — G-360{% endblock %}
{% block page_icon %}fa-solid fa-user-plus{% endblock %}
{% block page_title %}{{ action }} un client{% endblock %}

{% block content %}
<div style="max-width:480px">
    <div class="panel" style="padding:24px">
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom:14px">
                <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Nom complet *</label>
                <input type="text" name="nom" value="{{ client.nom|default:'' }}" required
                    style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
            </div>
            <div style="margin-bottom:14px">
                <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Téléphone</label>
                <input type="text" name="telephone" value="{{ client.telephone|default:'' }}"
                    placeholder="77 000 00 00"
                    style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
            </div>
            <div style="margin-bottom:20px">
                <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Adresse</label>
                <input type="text" name="adresse" value="{{ client.adresse|default:'' }}"
                    placeholder="Ex: Dakar, Médina"
                    style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <a href="{% url 'clients_liste' %}" style="height:38px;padding:0 16px;border:0.5px solid #e5e9f0;border-radius:8px;font-size:13px;color:#4a5568;text-decoration:none;display:flex;align-items:center">
                    Annuler
                </a>
                <button type="submit" style="height:38px;padding:0 20px;background:#1a56db;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">
                    <i class="fa-solid fa-check" style="margin-right:6px"></i>{{ action }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
