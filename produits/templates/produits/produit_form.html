{% extends 'dashboard/base.html' %}
{% block title %}{{ action }} produit — G-360{% endblock %}
{% block page_icon %}fa-solid fa-boxes-stacked{% endblock %}
{% block page_title %}{{ action }} un produit{% endblock %}

{% block content %}
<div style="max-width:600px">
    <div class="panel" style="padding:24px">
        <form method="post">
            {% csrf_token %}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
                <div style="grid-column:1/-1">
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Nom du produit *</label>
                    <input type="text" name="nom" value="{{ produit.nom|default:'' }}" required
                        style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
                </div>
                <div>
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Référence</label>
                    <input type="text" name="reference" value="{{ produit.reference|default:'' }}"
                        style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
                </div>
                <div>
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Catégorie</label>
                    <select name="categorie" style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none;background:white">
                        <option value="">-- Choisir --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}" {% if produit.categorie.id == cat.id %}selected{% endif %}>{{ cat.nom }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Prix d'achat (FCFA)</label>
                    <input type="number" name="prix_achat" value="{{ produit.prix_achat|default:'' }}"
                        style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
                </div>
                <div>
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Prix de vente (FCFA) *</label>
                    <input type="number" name="prix_vente" value="{{ produit.prix_vente|default:'' }}" required
                        style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
                </div>
                <div>
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Quantité en stock</label>
                    <input type="number" name="quantite_stock" value="{{ produit.quantite_stock|default:'0' }}"
                        style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
                </div>
                <div>
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Seuil d'alerte</label>
                    <input type="number" name="seuil_alerte" value="{{ produit.seuil_alerte|default:'5' }}"
                        style="width:100%;height:38px;border:0.5px solid #e5e9f0;border-radius:8px;padding:0 12px;font-size:13px;outline:none">
                </div>
                <div style="grid-column:1/-1">
                    <label style="font-size:11px;color:#8a94a6;display:block;margin-bottom:4px">Description</label>
                    <textarea name="description" rows="3"
                        style="width:100%;border:0.5px solid #e5e9f0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none;resize:none;font-family:'Segoe UI',sans-serif">{{ produit.description|default:'' }}</textarea>
                </div>
            </div>
            <div style="display:flex;gap:8px;justify-content:flex-end">
                <a href="{% url 'stock' %}" style="height:38px;padding:0 16px;border:0.5px solid #e5e9f0;border-radius:8px;font-size:13px;color:#4a5568;text-decoration:none;display:flex;align-items:center">
                    Annuler
                </a>
                <button type="submit" style="height:38px;padding:0 20px;background:#1a56db;color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">
                    <i class="fa-solid fa-check" style="margin-right:6px"></i>{{ action }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
