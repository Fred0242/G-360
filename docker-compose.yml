version: '3.8'

services:

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: g360
      POSTGRES_USER: g360user
      POSTGRES_PASSWORD: g360pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=g360
      - DB_USER=g360user
      - DB_PASSWORD=g360pass
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data:
