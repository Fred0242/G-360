name: G-360 CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ─── Job 1 : Tests ───────────────────────────────────────
  test:
    name: Tests Django
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: g360_test
          POSTGRES_USER: g360user
          POSTGRES_PASSWORD: g360pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-ci
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: g360_test
      DB_USER: g360user
      DB_PASSWORD: g360pass
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installation des dépendances système
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2

      - name: Installation des dépendances Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérification Django
        run: python manage.py check

      - name: Migrations
        run: python manage.py migrate

      - name: Tests
        run: python manage.py test --verbosity=2

  # ─── Job 2 : Build Docker ────────────────────────────────
  docker:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: g360:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3 : Deploy Render ───────────────────────────────
  deploy:
    name: Deploy sur Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déclenchement du déploiement Render
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"
        continue-on-error: true
