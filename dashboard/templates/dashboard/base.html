<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}G-360{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <nav class="bg-blue-800 text-white px-6 py-4 flex justify-between items-center shadow">
        <h1 class="text-xl font-bold">🏢 G-360</h1>
        <div class="flex gap-4 text-sm">
            <a href="?lang=fr" class="hover:underline">FR</a>
            <a href="?lang=wo" class="hover:underline">WO</a>
            <a href="?lang=it" class="hover:underline">IT</a>
        </div>
    </nav>

    <main class="p-6">
        {% block content %}{% endblock %}
    </main>

</body>
</html>
