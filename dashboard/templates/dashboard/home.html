{% extends 'dashboard/base.html' %}

{% block title %}Dashboard — G-360{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">

    <h2 class="text-2xl font-bold text-gray-800 mb-6">
        Bonjour, {{ user_name }} 
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <div class="bg-white rounded-xl shadow p-6 border-l-4 border-blue-500">
            <p class="text-sm text-gray-500">Clients</p>
            <p class="text-4xl font-bold text-blue-600">{{ stats.clients }}</p>
        </div>

        <div class="bg-white rounded-xl shadow p-6 border-l-4 border-green-500">
            <p class="text-sm text-gray-500">Factures</p>
            <p class="text-4xl font-bold text-green-600">{{ stats.factures }}</p>
        </div>

        <div class="bg-white rounded-xl shadow p-6 border-l-4 border-purple-500">
            <p class="text-sm text-gray-500">Produits</p>
            <p class="text-4xl font-bold text-purple-600">{{ stats.produits }}</p>
        </div>

    </div>

    <p class="mt-8 text-gray-400 text-sm">{{ app_name }} — Gestion commerciale 360°</p>

</div>
{% endblock %}
