services:
  - type: web
    name: g360
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: g360-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: g360-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: g360-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: g360-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: g360-db
          property: port

databases:
  - name: g360-db
    plan: free
